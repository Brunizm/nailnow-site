<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Abrindo NailNow…</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
        background: #fff8f8;
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px;
      }
      .card {
        background: #fff; border-radius: 20px;
        box-shadow: 0 4px 24px rgba(244,92,162,.15);
        padding: 40px 32px; max-width: 360px; width: 100%; text-align: center;
      }
      .logo { font-size: 36px; margin-bottom: 16px; }
      h1 { color: #f45ca2; font-size: 20px; font-weight: 800; margin-bottom: 10px; }
      p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
      .btn {
        display: inline-block; background: #f45ca2; color: #fff;
        border-radius: 14px; padding: 14px 28px;
        font-weight: 800; font-size: 15px; text-decoration: none;
        margin-bottom: 12px; width: 100%;
      }
      .btn-secondary {
        display: inline-block; background: #f3f3f3; color: #555;
        border-radius: 14px; padding: 12px 28px;
        font-weight: 600; font-size: 14px; text-decoration: none; width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">💅</div>
      <h1>Abrindo NailNow…</h1>
      <p id="msg">Aguarde, estamos abrindo o app para você.</p>
      <a id="openBtn" class="btn" href="nailnow://client-appointments">Abrir no app</a>
      <br/>
      <a class="btn-secondary" href="https://apps.apple.com/br/app/nailnow/id6744671724">
        Baixar NailNow na App Store
      </a>
    </div>
    <script>
      (function () {
        var deepLink = 'nailnow://client-appointments';
        var start = Date.now();
        window.location = deepLink;
        setTimeout(function () {
          if (Date.now() - start < 2500) {
            document.getElementById('msg').textContent =
              'Se o app não abriu, clique no botão abaixo para baixar.';
          }
        }, 2000);
      })();
    </script>
  </body>
</html>
